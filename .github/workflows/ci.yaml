name: CI

on:
  schedule:
    - cron: '0 3 * * 1'
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fast-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run fast unit tests
        run: mvn -B test

  jenkins-rule-tests:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run JenkinsRule test profile
        run: mvn -B test failsafe:integration-test failsafe:verify -Pjenkins-rule-tests
